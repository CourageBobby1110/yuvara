[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["mongodb", "mongoose"]

# Redirect www → apex (single canonical host = single cookie domain)
[[redirects]]
  from = "https://www.yuvara.com.ng/*"
  to = "https://yuvara.com.ng/:splat"
  status = 301
  force = true

# Force all routes to use Node.js runtime instead of Edge
[[edge_functions]]
  path = "/*"
  function = "___netlify-edge-handler-node-middleware"
  
[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"
