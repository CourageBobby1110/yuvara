      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="30%" stop-color="#FFFFFF" />
      <stop offset="50%" stop-color="#FAF9F6" />
      <stop offset="70%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#D4AF37" />
