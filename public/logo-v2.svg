<svg width="240" height="65" viewBox="0 0 240 65" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Premium Gold & White Merge Gradient - Kept for the Icon to Ensure Visibility -->
    <linearGradient id="gold-white-merge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#996515" />
      <stop offset="25%" stop-color="#D4AF37" />
      <stop offset="50%" stop-color="#FFFFFF" />
      <stop offset="75%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#996515" />
    </linearGradient>
  </defs>

  <!-- Abstract Icon Mark: The "Precision Y" -->
  <g id="icon-mark-sharp">
    <circle cx="32" cy="32" r="30" fill="#000000" />
    <circle cx="32" cy="32" r="28" stroke="url(#gold-white-merge)" stroke-width="1.5" />
    
    <!-- Unified Shimmering Y Icon -->
    <path d="M18 20L32 35L46 20M32 35V52" stroke="url(#gold-white-merge)" stroke-width="5" stroke-linejoin="miter" stroke-linecap="butt" />
  </g>

  <!-- Main Wordmark (YuVara) - Split Colors: Black & Solid Gold -->
  <text x="75" y="44" font-family="'Inter', -apple-system, sans-serif" font-weight="800" font-size="34" letter-spacing="-0.02em">
    <tspan fill="#000000">Yu</tspan><tspan fill="#D4AF37">Vara</tspan>
  </text>
</svg>
